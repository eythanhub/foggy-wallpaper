<script>
const canvas=document.getElementById('glc');
const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');

const VERT=`attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0.0,1.0);}`;

const FRAG=`
precision highp float;
uniform float u_time;
uniform vec2  u_res;
uniform vec2  u_mouse;
uniform vec2  u_click;
uniform float u_ctime;
uniform float u_reveal;

float h21(vec2 p){
  p=fract(p*vec2(234.34,435.345));
  p+=dot(p,p+34.23);
  return fract(p.x*p.y);
}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(
    mix(h21(i),h21(i+vec2(1,0)),f.x),
    mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.0,a=0.5;
  mat2 r=mat2(0.866,-0.5,0.5,0.866);
  for(int i=0;i<7;i++){v+=a*noise(p);p=r*p*2.1+vec2(5.3,1.7);a*=0.48;}
  return v;
}
float bloom(vec2 uv,float sp){
  float age=u_time-u_ctime;
  if(age<0.0||age>3.2)return 0.0;
  float r=length(uv-u_click),fade=1.0-age/3.2;
  float ring=smoothstep(0.032,0.0,abs(r-age*sp))*fade*1.6;
  float glo=smoothstep(age*sp*1.4,0.0,r)*fade*0.22;
  return ring+glo;
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float t=u_time*0.09;
  vec3 bg=vec3(0.004,0.004,0.188);
  vec3 purple=vec3(0.263,0.0,0.404);
  vec3 lav=vec3(0.871,0.890,1.0);

  vec2 toM=uv-u_mouse;
  float md=length(toM);
  vec2 turb=toM/(md*md+0.07)*0.028;

  vec2 p=uv*3.2+vec2(0.0,t)+turb;
  float n =fbm(p);
  float n2=fbm(p+n*1.7+vec2(3.1,1.9));
  float n3=fbm(p*1.5+vec2(n2,n)+vec2(-1.3,2.2)+t*vec2(0.14,0.09));
  float n4=fbm(p*0.8+vec2(n3*0.6,n2*0.4)+vec2(7.1,-3.3));

  float centerDist=length(uv-vec2(0.5));
  float clearing=u_reveal*smoothstep(0.22,0.0,centerDist);
  n3=mix(n3,0.18,clearing*1.1);
  n3+=u_reveal*smoothstep(0.3,0.0,centerDist)*0.6
     *fbm(uv*5.0+vec2(cos(u_time*0.3),sin(u_time*0.3))*0.5)*0.3;

  vec3 col=bg;
  col=mix(col,purple*2.3,smoothstep(0.28,0.65,n3)*0.62);
  col=mix(col,lav,       smoothstep(0.70,0.90,n3)*0.42);
  col=mix(col,purple*1.6,smoothstep(0.55,0.35,n2)*0.28);
  col*=0.72+smoothstep(0.36,0.58,n)*0.48;
  col+=lav*0.08*smoothstep(0.6,0.8,n4);

  col+=purple*0.5*clearing*smoothstep(0.25,0.0,centerDist);
  col+=lav*0.12*clearing*smoothstep(0.12,0.0,centerDist);

  col+=purple*2.0*smoothstep(0.32,0.0,md)*0.38;
  col+=lav*smoothstep(0.12,0.0,md)*0.18;

  col+=bloom(uv,0.32)*(lav*0.75+purple*0.5);
  col+=bloom(uv,0.14)*lav*0.4;

  gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);
}
`;

function mkShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,mkShader(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog,mkShader(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
window.addEventListener('resize',resize);

let mouse=[0.5,0.5],clickPos=[0.5,0.5],clickT=-9999,logoReveal=0,targetReveal=0;
const t0=performance.now()/1000;

const logoWrap=document.getElementById('logo-wrap');
const logoImg=document.getElementById('logo-img');
const logoCorona=document.getElementById('logo-corona');

function setReveal(val){
  logoReveal=val;
  logoWrap.style.opacity=val>0.005?'1':'0';
  logoImg.style.opacity=(val*0.88).toFixed(3);
  logoCorona.style.opacity=val.toFixed(3);
  const g1=val*20,g2=val*48;
  logoImg.style.filter=
    `drop-shadow(0 0 ${g1}px rgba(222,227,255,${(val*0.95).toFixed(2)})) `+
    `drop-shadow(0 0 ${g2}px rgba(67,0,103,${val.toFixed(2)}))`;
}

document.addEventListener('mousemove',e=>{
  const nx=e.clientX/window.innerWidth;
  const ny=e.clientY/window.innerHeight;
  mouse=[nx,1-ny];
  const dx=nx-0.5,dy=ny-0.5;
  targetReveal=Math.max(0,1-Math.sqrt(dx*dx+dy*dy)/0.18);
});

document.addEventListener('click',e=>{
  clickPos=[e.clientX/window.innerWidth,1-e.clientY/window.innerHeight];
  clickT=performance.now()/1000-t0;
});

function draw(){
  logoReveal+=(targetReveal-logoReveal)*0.06;
  setReveal(logoReveal);

  const t=performance.now()/1000-t0;
  gl.useProgram(prog);
  const loc=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const u=n=>gl.getUniformLocation(prog,n);
  gl.uniform1f(u('u_time'),t);
  gl.uniform2f(u('u_res'),canvas.width,canvas.height);
  gl.uniform2fv(u('u_mouse'),mouse);
  gl.uniform2fv(u('u_click'),clickPos);
  gl.uniform1f(u('u_ctime'),clickT);
  gl.uniform1f(u('u_reveal'),logoReveal);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(draw);
}
draw();
</script>
